name: Fetch YouTube Views

on:
  schedule:
    - cron: "0 */8 * * *"
  workflow_dispatch:

concurrency:
  group: daily-views-update
  cancel-in-progress: false

jobs:
  fetch-views:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run fetch-views script
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
        run: node fetch-views.js

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update daily_views.json [skip ci]"
          file_pattern: "daily_views.json"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
